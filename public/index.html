<!DOCTYPE html>
<html>
<head>
    <title>GhostScrape Test Tool</title>
</head>
<body style="background-color: white; color: black; font-family: sans-serif; padding: 20px;">

    <h1>GhostScrape Debugger</h1>
    <p>Enter your details below to scrape a URL.</p>
    <hr>

    <div style="margin-bottom: 20px;">
        <label><b>1. Your API Key:</b></label><br>
        <input type="text" id="key" style="width: 400px;" placeholder="Paste key from Supabase here">
    </div>

    <div style="margin-bottom: 20px;">
        <label><b>2. URL to Scrape:</b></label><br>
        <input type="text" id="url" style="width: 400px;" placeholder="https://example.com">
        <button id="btn" onclick="startScrape()">SCRAPE NOW</button>
    </div>

    <hr>
    <h3>Results:</h3>
    <pre id="output" style="background: #eee; padding: 10px; border: 1px solid #ccc; min-height: 200px; white-space: pre-wrap;">Waiting for input...</pre>

    <script>
        async function startScrape() {
            const urlInput = document.getElementById('url').value;
            const keyInput = document.getElementById('key').value;
            const out = document.getElementById('output');
            const btn = document.getElementById('btn');

            if (!urlInput || !keyInput) {
                alert("Please fill in both boxes.");
                return;
            }

            out.innerText = "Connecting to ghost-scrape.tech/scrape...";
            btn.disabled = true;

            try {
                const response = await fetch('/scrape?url=' + encodeURIComponent(urlInput), {
                    method: 'GET',
                    headers: { 'x-api-key': keyInput }
                });
                
                const data = await response.json();
                out.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                out.innerText = "Error connecting to server: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
