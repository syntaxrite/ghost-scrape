<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostScrape | Testing Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #02040a; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(13, 17, 23, 0.8); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Ghost<span class="text-blue-500">Scrape</span> Debugger</h1>
        <p class="text-slate-400 mb-8">Manual testing mode (No login required)</p>

        <div class="glass p-6 rounded-2xl space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Your API Key (Get this from Supabase Table)</label>
                <input type="text" id="manualKey" placeholder="Paste your api_key here..." 
                    class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-blue-400 font-mono focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Target URL</label>
                <div class="flex gap-4">
                    <input type="text" id="testUrl" placeholder="https://example.com" 
                        class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:border-blue-500 outline-none">
                    <button onclick="runTest()" id="btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold">Scrape</button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Response</label>
                <pre id="output" class="w-full bg-black/80 rounded-xl p-6 text-sm text-blue-300 overflow-x-auto min-h-[300px] border border-white/5 font-mono">Results will appear here...</pre>
            </div>
        </div>
    </div>

    <script>
        async function runTest() {
            const url = document.getElementById('testUrl').value;
            const key = document.getElementById('manualKey').value;
            const out = document.getElementById('output');
            const btn = document.getElementById('btn');

            if (!url || !key) return alert("Fill in both URL and API Key!");

            out.innerText = "Connecting to Vercel Backend...";
            btn.disabled = true;
            btn.innerText = "Loading...";

            try {
                // We use /scrape because your vercel.json rewrites /scrape to /api/index.js
                const response = await fetch(`/scrape?url=${encodeURIComponent(url)}`, {
                    headers: { 'x-api-key': key }
                });
                
                const data = await response.json();
                out.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                out.innerText = "FATAL ERROR: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Scrape";
            }
        }
    </script>
</body>
</html>
