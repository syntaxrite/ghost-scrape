<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostScrape Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#02040a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-2xl bg-[#0d1117] border border-white/10 p-8 rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center">Ghost<span class="text-blue-500">Scrape</span> Test Console</h1>
        
        <div class="space-y-4">
            <input type="text" id="manualKey" placeholder="Paste your API Key here" 
                class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-blue-400 font-mono outline-none focus:border-blue-500">

            <div class="flex gap-2">
                <input type="text" id="targetUrl" placeholder="https://example.com" 
                    class="flex-1 bg-black/50 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500">
                <button onclick="scrapeNow()" id="btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition">
                    Scrape
                </button>
            </div>

            <div class="mt-6">
                <label class="text-xs font-bold text-gray-500 uppercase">Output</label>
                <pre id="output" class="mt-2 w-full bg-black rounded-xl p-4 text-sm text-green-400 overflow-auto max-h-[400px] border border-white/5 font-mono">
Ready...
                </pre>
            </div>
        </div>
    </div>

    <script>
        async function scrapeNow() {
            const url = document.getElementById('targetUrl').value;
            const key = document.getElementById('manualKey').value;
            const out = document.getElementById('output');
            const btn = document.getElementById('btn');

            if (!url || !key) {
                alert("Enter both the API Key and the URL!");
                return;
            }

            out.innerText = "Connecting to backend...";
            btn.disabled = true;
            btn.innerText = "Working...";

            try {
                // This calls your Vercel backend at ghost-scrape.tech/scrape
                const res = await fetch(`/scrape?url=${encodeURIComponent(url)}`, {
                    method: 'GET',
                    headers: { 'x-api-key': key }
                });
                
                const data = await res.json();
                out.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                out.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Scrape";
            }
        }
    </script>
</body>
</html>
