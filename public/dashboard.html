<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Ghost Scrape</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script><style>
body{
  background:#050505;
  color:white;
  font-family:Inter,sans-serif;
}
</style></head><body class="min-h-screen"><!-- TOP BAR --><div class="border-b border-white/10 px-6 py-4 flex justify-between items-center">
  <div class="font-black text-xl">Ghost Scrape</div>
  <button onclick="logout()" class="text-sm text-red-400">Logout</button>
</div><!-- MAIN --><div class="max-w-5xl mx-auto px-6 py-10">  <h1 class="text-3xl font-black mb-8">Developer Dashboard</h1>  <!-- GRID -->  <div class="grid md:grid-cols-3 gap-6"><!-- API KEY -->
<div class="bg-white/5 border border-white/10 rounded-2xl p-5">
  <h2 class="font-bold mb-3">API Key</h2>

  <div class="bg-black p-3 rounded-xl text-xs break-all text-purple-300">
    <span id="apiKey">Loading...</span>
  </div>

  <button onclick="copyKey()"
    class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-2 rounded-xl text-sm font-bold">
    Copy Key
  </button>
</div>

<!-- USAGE -->
<div class="bg-white/5 border border-white/10 rounded-2xl p-5">
  <h2 class="font-bold mb-3">Usage Today</h2>

  <div class="text-3xl font-black">
    <span id="usage">0</span> / <span id="limit">10</span>
  </div>

  <div class="w-full bg-white/10 h-2 rounded-full mt-4">
    <div id="bar" class="h-2 bg-purple-600 rounded-full" style="width:0%"></div>
  </div>
</div>

<!-- QUICK START -->
<div class="bg-white/5 border border-white/10 rounded-2xl p-5">
  <h2 class="font-bold mb-3">Quick Start</h2>

  <pre class="text-xs bg-black p-3 rounded-xl overflow-x-auto">

POST /api/scrape
x-api-key: YOUR_KEY

{
"url": "https://example.com"
}
</pre>
</div>

  </div></div><script>
const key = localStorage.getItem("ghost_api_key");

if(!key){
  window.location.href="/login.html";
}

document.getElementById("apiKey").innerText = key;

async function load(){
  const res = await fetch("/api/user/stats",{
    headers: {"x-api-key": key}
  });

  const data = await res.json();

  if(!data.success){
    localStorage.removeItem("ghost_api_key");
    window.location.href="/login.html";
  }

  document.getElementById("usage").innerText = data.usageToday;
  document.getElementById("limit").innerText = data.limit;

  const pct = (data.usageToday / data.limit) * 100;
  document.getElementById("bar").style.width = pct + "%";
}

load();

function copyKey(){
  navigator.clipboard.writeText(key);
  alert("Copied");
}

function logout(){
  localStorage.removeItem("ghost_api_key");
  window.location.href="/login.html";
}
</script></body>
</html>
