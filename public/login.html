<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Ghost Scrape</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10">
    <h1 class="text-3xl font-black mb-6 text-center">Login</h1>

    <!-- LOGGED IN -->
    <div id="loggedInBox" class="hidden text-center">
        <p class="text-green-400 font-bold mb-4">Already Logged In</p>

        <div id="apiKeyBox" class="bg-black border border-white/10 p-4 rounded-xl break-all mb-4"></div>

        <button onclick="copyKey()" class="w-full bg-purple-600 py-2 rounded-xl mb-3">
            Copy API Key
        </button>

        <button onclick="logout()" class="w-full bg-red-600 py-2 rounded-xl">
            Logout
        </button>
    </div>

    <!-- EMAIL STEP -->
    <div id="emailStep">
        <input id="email" type="email" placeholder="Enter your email"
            class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl">
        
        <button onclick="requestOTP()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">
            Send OTP
        </button>
    </div>

    <!-- OTP STEP -->
    <div id="otpStep" class="hidden">
        <input id="otp" type="text" placeholder="Enter OTP"
            class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl">
        
        <button onclick="verifyOTP()" class="w-full bg-green-600 py-3 rounded-xl font-bold">
            Verify & Login
        </button>
    </div>

    <p id="status" class="text-sm text-gray-400 mt-4 text-center"></p>
</div>

<script>

const API_BASE = "";
const apiKey = localStorage.getItem("ghost_api_key");

window.onload = async () => {
    if (!apiKey) return;

    //  VERIFY KEY WITH BACKEND
    try {
        const res = await fetch(`/api/user/stats`, {
            headers: { "x-api-key": apiKey }
        });

        const data = await res.json();

        if (res.ok && data.success) {
            showLoggedIn(apiKey);
        } else {
            localStorage.removeItem("ghost_api_key");
        }
    } catch {
        localStorage.removeItem("ghost_api_key");
    }
};

function showLoggedIn(key) {
    document.getElementById("emailStep").classList.add("hidden");
    document.getElementById("otpStep").classList.add("hidden");
    document.getElementById("loggedInBox").classList.remove("hidden");
    document.getElementById("apiKeyBox").innerText = key;
}

async function requestOTP() {
    const email = document.getElementById("email").value.trim().toLowerCase();

    if (!email) return alert("Enter email");

    setStatus("Sending OTP...");

    const res = await fetch(`/api/auth/request-otp`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok && data.success) {
        document.getElementById("emailStep").classList.add("hidden");
        document.getElementById("otpStep").classList.remove("hidden");
        setStatus("OTP sent!");
    } else {
        setStatus(data.error || "Failed");
    }
}

async function verifyOTP() {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const otp = document.getElementById("otp").value.trim();

    if (!otp) return alert("Enter OTP");

    setStatus("Verifying...");

    const res = await fetch(`/api/auth/verify-otp`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, code: otp })
    });

    const data = await res.json();

    if (res.ok && data.success) {
        localStorage.setItem("ghost_api_key", data.apiKey);
        showLoggedIn(data.apiKey);
        setStatus("Login successful");
    } else {
        setStatus(data.error || "Invalid OTP");
    }
}

function copyKey() {
    navigator.clipboard.writeText(localStorage.getItem("ghost_api_key"));
    setStatus("Copied!");
}

function logout() {
    localStorage.removeItem("ghost_api_key");
    location.reload();
}

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
