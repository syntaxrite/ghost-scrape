<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ghost Scrape</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10">
        <h1 class="text-3xl font-black mb-6 text-center">Login</h1>

        <!-- STEP 1 -->
        <div id="emailStep">
            <input id="email" type="email" placeholder="Enter your email"
                class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl outline-none">
            
            <button id="sendBtn" onclick="requestOTP()" 
                class="w-full bg-purple-600 py-3 rounded-xl font-bold hover:bg-purple-500">
                Send OTP
            </button>
        </div>

        <!-- STEP 2 -->
        <div id="otpStep" class="hidden">
            <input id="otp" type="text" placeholder="Enter OTP"
                class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl outline-none">
            
            <button id="verifyBtn" onclick="verifyOTP()" 
                class="w-full bg-green-600 py-3 rounded-xl font-bold hover:bg-green-500">
                Verify & Login
            </button>
        </div>

        <p id="status" class="text-sm text-gray-400 mt-4 text-center"></p>
    </div>

    <script>
        function setStatus(msg) {
            document.getElementById("status").innerText = msg;
        }

        function normalizeEmail(email) {
            return email.trim().toLowerCase();
        }

        async function requestOTP() {
            const btn = document.getElementById("sendBtn");
            let email = document.getElementById("email").value;

            email = normalizeEmail(email);

            if (!email) return alert("Enter email");

            btn.disabled = true;
            setStatus("Sending OTP...");

            try {
                const res = await fetch("/api/auth/request-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    document.getElementById("emailStep").classList.add("hidden");
                    document.getElementById("otpStep").classList.remove("hidden");
                    setStatus("OTP sent! Check your inbox.");
                } else {
                    setStatus(data.error || "Failed to send OTP");
                }

            } catch (err) {
                console.error(err);
                setStatus("Network error");
            } finally {
                btn.disabled = false;
            }
        }

        async function verifyOTP() {
            const btn = document.getElementById("verifyBtn");
            let email = document.getElementById("email").value;
            let otp = document.getElementById("otp").value;

            email = normalizeEmail(email);
            otp = otp.trim();

            if (!otp) return alert("Enter OTP");

            btn.disabled = true;
            setStatus("Verifying...");

            try {
                const res = await fetch("/api/auth/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, code: otp }) // match backend
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    localStorage.setItem("ghost_api_key", data.apiKey);

                    setStatus("Login successful!");

                    setTimeout(() => {
                        window.location.href = "/";
                    }, 800);

                } else {
                    setStatus(data.error || "Invalid OTP");
                }

            } catch (err) {
                console.error(err);
                setStatus("Verification failed");
            } finally {
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
