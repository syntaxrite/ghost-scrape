<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10">
        <h1 class="text-3xl font-black mb-6 text-center">Login</h1>

        <!-- ✅ ALREADY LOGGED IN -->
        <div id="loggedInBox" class="hidden text-center">
            <p class="text-green-400 font-bold mb-4">✅ Already Logged In</p>

            <div class="bg-black border border-white/10 rounded-xl p-4 text-sm break-all mb-4" id="apiKeyBox"></div>

            <button onclick="copyKey()" class="w-full bg-purple-600 py-2 rounded-xl mb-3">
                Copy API Key
            </button>

            <button onclick="logout()" class="w-full bg-red-600 py-2 rounded-xl">
                Logout
            </button>
        </div>

        <!-- STEP 1 -->
        <div id="emailStep">
            <input id="email" type="email" placeholder="Enter your email"
                class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl outline-none">
            
            <button id="sendBtn" onclick="requestOTP()" 
                class="w-full bg-purple-600 py-3 rounded-xl font-bold hover:bg-purple-500">
                Send OTP
            </button>
        </div>

        <!-- STEP 2 -->
        <div id="otpStep" class="hidden">
            <input id="otp" type="text" placeholder="Enter OTP"
                class="w-full p-4 mb-4 bg-black border border-white/10 rounded-xl outline-none">
            
            <button id="verifyBtn" onclick="verifyOTP()" 
                class="w-full bg-green-600 py-3 rounded-xl font-bold hover:bg-green-500">
                Verify & Login
            </button>
        </div>

        <p id="status" class="text-sm text-gray-400 mt-4 text-center"></p>
    </div>

    <script>
        function setStatus(msg) {
            document.getElementById("status").innerText = msg;
        }

        function normalizeEmail(email) {
            return email.trim().toLowerCase();
        }

        // ✅ CHECK LOGIN STATE ON LOAD
        window.onload = () => {
            const apiKey = localStorage.getItem("ghost_api_key");

            if (apiKey) {
                document.getElementById("emailStep").classList.add("hidden");
                document.getElementById("otpStep").classList.add("hidden");

                document.getElementById("loggedInBox").classList.remove("hidden");
                document.getElementById("apiKeyBox").innerText = apiKey;
            }
        };

        async function requestOTP() {
            const btn = document.getElementById("sendBtn");
            let email = document.getElementById("email").value;

            email = normalizeEmail(email);

            if (!email) return alert("Enter email");

            btn.disabled = true;
            setStatus("Sending OTP...");

            try {
                const res = await fetch("/api/auth/request-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    document.getElementById("emailStep").classList.add("hidden");
                    document.getElementById("otpStep").classList.remove("hidden");
                    setStatus("OTP sent! Check your inbox.");
                } else {
                    setStatus(data.error || "Failed to send OTP");
                }

            } catch (err) {
                console.error(err);
                setStatus("Network error");
            } finally {
                btn.disabled = false;
            }
        }

        async function verifyOTP() {
            const btn = document.getElementById("verifyBtn");
            let email = document.getElementById("email").value;
            let otp = document.getElementById("otp").value;

            email = normalizeEmail(email);
            otp = otp.trim();

            if (!otp) return alert("Enter OTP");

            btn.disabled = true;
            setStatus("Verifying...");

            try {
                const res = await fetch("/api/auth/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, code: otp })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    localStorage.setItem("ghost_api_key", data.apiKey);

                    setStatus("Login successful!");

                    setTimeout(() => {
                        location.reload(); // ✅ reload to trigger logged-in UI
                    }, 500);

                } else {
                    setStatus(data.error || "Invalid OTP");
                }

            } catch (err) {
                console.error(err);
                setStatus("Verification failed");
            } finally {
                btn.disabled = false;
            }
        }

        function copyKey() {
            const key = localStorage.getItem("ghost_api_key");
            navigator.clipboard.writeText(key);
            setStatus("Copied API key!");
        }

        function logout() {
            localStorage.removeItem("ghost_api_key");
            location.reload();
        }
    </script>

</body>
</html>
