<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Ghost Scrape API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>  <style>
    body {
      background: #050505;
      color: white;
      font-family: Inter, sans-serif;
    }
    <link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png">

<meta property="og:title" content="Ghost Scrape">
<meta property="og:description" content="Fast scraping API">
<meta property="og:image" content="/logo-512.png">
  </style></head><body class="min-h-screen flex items-center justify-center px-6"><div class="w-full max-w-5xl grid md:grid-cols-2 gap-10">  <!-- LEFT PANEL -->  <div class="hidden md:flex flex-col justify-center">
    <h1 class="text-5xl font-black mb-4">
      Ghost Scrape API
    </h1><p class="text-gray-400 text-lg leading-relaxed">
  Convert any URL into clean, LLM-ready Markdown in milliseconds.
  Built for developers, agents, and AI pipelines.
</p>

<div class="mt-6 text-sm text-gray-500 space-y-2">
  <p>⚡ No scraping setup</p>
  <p>🔐 Secure API key auth</p>
  <p>📦 Free tier included</p>
</div>

  </div>  <!-- RIGHT PANEL -->  <div class="bg-white/5 border border-white/10 rounded-2xl p-8"><h2 class="text-2xl font-bold mb-6">Login</h2>

<!-- EMAIL -->
<div id="emailStep">
  <input id="email" type="email"
    placeholder="you@company.com"
    class="w-full p-4 rounded-xl bg-black border border-white/10 mb-4 outline-none">

  <button onclick="requestOTP()"
    class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold">
    Send OTP
  </button>
</div>

<!-- OTP -->
<div id="otpStep" class="hidden">
  <input id="otp" type="text"
    placeholder="6-digit code"
    class="w-full p-4 rounded-xl bg-black border border-white/10 mb-4 outline-none">

  <button onclick="verifyOTP()"
    class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold">
    Verify & Continue
  </button>
</div>

<p id="status" class="text-sm text-gray-400 mt-4 text-center"></p>

  </div></div><script>
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

async function requestOTP(){
  const email = document.getElementById("email").value.trim();
  if(!email) return setStatus("Enter email");

  setStatus("Sending code...");

  const res = await fetch("/api/auth/request-otp", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("emailStep").classList.add("hidden");
    document.getElementById("otpStep").classList.remove("hidden");
    setStatus("OTP sent");
  } else {
    setStatus(data.error || "Failed");
  }
}

async function verifyOTP(){
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();

  setStatus("Verifying...");

  const res = await fetch("/api/auth/verify-otp", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, code: otp})
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("ghost_api_key", data.apiKey);
    window.location.href = "/dashboard.html";
  } else {
    setStatus(data.error || "Invalid OTP");
  }
}
</script></body>
</html>
