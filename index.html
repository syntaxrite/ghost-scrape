<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Scrape | Professional Article Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
    .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { to { transform: rotate(360deg); } }
  </style>
</head>

<body class="min-h-screen flex flex-col p-6">
  <nav class="max-w-4xl mx-auto w-full flex justify-between items-center mb-12">
    <div class="font-bold text-2xl tracking-tight">Ghost<span class="text-blue-500">Scrape</span></div>
    <div class="text-xs text-gray-500 mono uppercase tracking-widest">v1.0 Stable</div>
  </nav>

  <main class="max-w-4xl mx-auto w-full space-y-8">
    <section class="glass rounded-2xl p-2 flex items-center focus-within:ring-2 ring-blue-500/50 transition-all">
      <input id="urlInput" type="text" placeholder="Paste article URL here..." 
             class="bg-transparent flex-1 p-4 outline-none text-lg">
      <button id="scrapeBtn" onclick="handleScrape()" 
              class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl font-bold transition-all disabled:opacity-50">
        Clean
      </button>
    </section>

    <section id="resultArea" class="hidden space-y-4">
      <div class="flex justify-between items-end">
        <div class="flex gap-4 text-xs mono text-gray-400">
          <div>WORDS: <span id="wordCount" class="text-blue-400">0</span></div>
          <div>SOURCE: <span id="sourceType" class="text-blue-400">-</span></div>
        </div>
        <div class="flex gap-2">
          <button onclick="copyToClipboard()" class="glass px-4 py-2 rounded-lg text-sm hover:bg-white/10">Copy Markdown</button>
          <button onclick="downloadMd()" class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200">Download .md</button>
        </div>
      </div>

      <div class="glass rounded-2xl p-6 min-h-[400px]">
        <h2 id="articleTitle" class="text-3xl font-extrabold mb-6"></h2>
        <div id="markdownOutput" class="prose prose-invert max-w-none mono text-sm text-gray-300 whitespace-pre-wrap"></div>
      </div>
    </section>
  </main>

  <script>
    let currentMarkdown = "";

    async function handleScrape() {
      const btn = document.getElementById('scrapeBtn');
      const url = document.getElementById('urlInput').value;
      if (!url) return;

      btn.disabled = true;
      btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white/20 rounded-full"></div>`;

      try {
        const response = await fetch(`/api/scrape?url=${encodeURIComponent(url)}`);
        const data = await response.json();

        if (data.success) {
          currentMarkdown = data.markdown;
          document.getElementById('articleTitle').innerText = data.title;
          document.getElementById('markdownOutput').innerText = data.markdown;
          document.getElementById('wordCount').innerText = data.wordCount;
          document.getElementById('sourceType').innerText = data.source;
          document.getElementById('resultArea').classList.remove('hidden');
        } else {
          alert("Error: " + data.error);
        }
      } catch (err) {
        alert("Extraction failed.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Clean";
      }
    }

    function copyToClipboard() {
      navigator.clipboard.writeText(currentMarkdown);
      alert("Markdown copied!");
    }

    function downloadMd() {
      const blob = new Blob([currentMarkdown], { type: "text/markdown" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "article.md";
      a.click();
    }
  </script>
</body>
</html>
