<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Scrape</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
.mono { font-family: 'JetBrains Mono', monospace; }
.glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); }
</style>
</head>

<body class="min-h-screen flex flex-col">

<!-- NAV -->
<nav class="flex justify-between px-8 py-6 max-w-6xl mx-auto w-full">
  <div class="font-bold text-xl">Ghost<span class="text-blue-500">Scrape</span></div>
</nav>

<!-- HERO -->
<main class="flex-1 flex flex-col items-center justify-center px-4">

<h1 class="text-5xl font-extrabold mb-4 text-center">
  Clean Any Article → Markdown
</h1>

<p class="text-gray-500 mb-10 text-center">
  Blogs · News · Wikipedia · AI-ready output
</p>

<!-- INPUT -->
<div class="glass rounded-xl p-2 flex w-full max-w-2xl">
  <input id="urlInput"
    placeholder="Paste article URL..."
    class="flex-1 bg-transparent p-4 outline-none text-lg">
  
  <button id="btn" onclick="scrape()"
    class="bg-blue-600 px-6 rounded-lg font-semibold hover:bg-blue-500">
    Clean
  </button>
</div>

<!-- ERROR -->
<div id="errorBox" class="hidden mt-6 text-red-400 text-sm"></div>

<!-- RESULTS -->
<div id="result" class="hidden w-full max-w-6xl mt-16 grid md:grid-cols-2 gap-6">

  <!-- META -->
  <div class="glass p-6 rounded-xl space-y-3">
    <h3 class="text-xs text-gray-400 uppercase">Metadata</h3>

    <div>
      <p class="text-xs text-gray-500">Title</p>
      <p id="title" class="font-semibold"></p>
    </div>

    <div>
      <p class="text-xs text-gray-500">Words</p>
      <p id="words"></p>
    </div>

    <div>
      <p class="text-xs text-gray-500">Source</p>
      <p id="source"></p>
    </div>

    <button onclick="copyMd()" class="mt-4 w-full py-2 bg-white/10 rounded">
      Copy Markdown
    </button>

    <button onclick="downloadMd()" class="w-full py-2 bg-white/10 rounded">
      Download .md
    </button>
  </div>

  <!-- OUTPUT -->
  <div class="glass p-6 rounded-xl">
    <div class="flex justify-between mb-2">
      <span class="text-xs text-gray-400">Markdown</span>
      <button onclick="toggleView()" class="text-xs text-blue-400">Toggle View</button>
    </div>

    <pre id="output" class="mono text-sm h-96 overflow-auto whitespace-pre-wrap"></pre>

    <div id="preview" class="hidden prose prose-invert max-w-none h-96 overflow-auto"></div>
  </div>

</div>

</main>

<footer class="text-center text-xs text-gray-600 p-6">
  Ghost Scrape © 2026
</footer>

<script>
let currentMarkdown = "";
let previewMode = false;

async function scrape() {
  const url = document.getElementById("urlInput").value.trim();
  const btn = document.getElementById("btn");
  const errorBox = document.getElementById("errorBox");

  if (!url) {
    errorBox.innerText = "Enter a URL";
    errorBox.classList.remove("hidden");
    return;
  }

  errorBox.classList.add("hidden");

  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    const res = await fetch(`/api/scrape?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (!data.success) {
      errorBox.innerText = data.error;
      errorBox.classList.remove("hidden");
      return;
    }

    currentMarkdown = data.markdown;

    document.getElementById("title").innerText = data.title;
    document.getElementById("words").innerText = data.wordCount;
    document.getElementById("source").innerText = data.source;

    document.getElementById("output").innerText = currentMarkdown;
    document.getElementById("preview").innerHTML = markdownToHtml(currentMarkdown);

    document.getElementById("result").classList.remove("hidden");

  } catch (err) {
    errorBox.innerText = "Server error. Check deployment.";
    errorBox.classList.remove("hidden");
  }

  btn.innerText = "Clean";
  btn.disabled = false;
}

function copyMd() {
  navigator.clipboard.writeText(currentMarkdown);
  alert("Copied!");
}

function downloadMd() {
  const blob = new Blob([currentMarkdown], { type: "text/markdown" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "article.md";
  a.click();
}

function toggleView() {
  previewMode = !previewMode;

  document.getElementById("output").classList.toggle("hidden", previewMode);
  document.getElementById("preview").classList.toggle("hidden", !previewMode);
}

// basic markdown → html (lightweight)
function markdownToHtml(md) {
  return md
    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
    .replace(/\n/g, '<br>');
}

// ENTER key support
document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") scrape();
});
</script>

</body>
</html>
