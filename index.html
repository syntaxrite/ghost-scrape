<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Scrape | Next-Gen AI Extraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&family=Architects+Daughter&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --purple: #a855f7; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hand { font-family: 'Architects Daughter', cursive; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        
        /* Custom Loader */
        .loader { 
            width: 20px; height: 20px; border: 2px solid rgba(168, 85, 247, 0.3);
            border-top-color: var(--purple); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scribble Animation */
        .scribble-path {
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: draw 2s ease-in-out forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3 group cursor-pointer">
            <div class="p-2 bg-purple-600 rounded-xl group-hover:rotate-12 transition-all">
                <i data-lucide="ghost" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter">ghost-scrape<span class="text-purple-500">.tech</span></span>
        </div>
        
        <div class="hidden md:flex items-center gap-8 text-sm font-bold text-gray-400">
            <a href="#" class="hover:text-white transition-colors">Pricing</a>
            <a href="#" class="hover:text-white transition-colors">API</a>
            <div class="h-4 w-[1px] bg-white/10"></div>
            <a href="#" class="hover:text-white transition-colors">Login</a>
            <button class="px-6 py-2 bg-white text-black rounded-full hover:bg-purple-400 transition-all shadow-[4px_4px_0px_0px_rgba(168,85,247,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
                Join Beta
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-20">
        <header class="text-center mb-16 relative">
            <div class="inline-block px-4 py-1.5 mb-6 border border-dashed border-purple-500/50 rounded-full text-purple-400 text-xs font-mono uppercase tracking-widest">
                ⚡ Optimized for LLMs & RAG
            </div>
            <h1 class="text-5xl md:text-8xl font-black mb-6 leading-none tracking-tight">
                Scrape <span class="relative italic text-purple-500">any
                    <svg class="absolute -bottom-2 left-0 w-full h-4" viewBox="0 0 100 10" preserveAspectRatio="none">
                        <path class="scribble-path" d="M0,5 Q25,0 50,5 T100,5" stroke="currentColor" stroke-width="4" fill="none" />
                    </svg>
                </span> article.
            </h1>
            <p class="text-gray-400 text-xl max-w-2xl mx-auto">
                Cheaper. Smarter. Faster. Convert chaotic URLs into clean Markdown for your AI agents.
            </p>
        </header>

        <section class="max-w-3xl mx-auto mb-20">
            <div class="glass p-2 rounded-3xl flex items-center shadow-2xl focus-within:ring-2 ring-purple-500/40 transition-all">
                <div class="pl-4 text-gray-500"><i data-lucide="link" class="w-5 h-5"></i></div>
                <input id="urlInput" type="text" placeholder="https://wikipedia.org/wiki/Ghost..." 
                       class="bg-transparent flex-1 p-4 outline-none text-lg">
                <button id="scrapeBtn" onclick="handleScrape()" 
                        class="bg-purple-600 hover:bg-purple-500 px-10 py-4 rounded-2xl font-black transition-all flex items-center gap-2 disabled:opacity-50">
                    <span>Clean</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="mt-4 flex justify-end">
                <div class="rotate-6 flex flex-col items-center">
                    <p class="hand text-purple-400 text-lg">Try a blog link! ✨</p>
                    <svg width="40" height="40" viewBox="0 0 40 40" class="text-purple-400">
                        <path d="M10 10 Q 20 5 30 20 T 10 35" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
            </div>
        </section>

        <section id="resultArea" class="hidden animate-in fade-in slide-in-from-bottom-8 duration-700">
            <div class="glass rounded-[2.5rem] overflow-hidden border-white/5">
                <div class="px-8 py-5 border-b border-white/5 flex flex-wrap justify-between items-center bg-white/5 gap-4">
                    <div class="flex gap-6 text-[10px] mono text-gray-500 uppercase tracking-[0.2em]">
                        <div>Words: <span id="wordCount" class="text-purple-400">0</span></div>
                        <div>Source: <span id="sourceType" class="text-purple-400">-</span></div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="copyToClipboard()" class="p-2 hover:bg-white/10 rounded-lg transition-colors" title="Copy Content">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <button onclick="downloadMd()" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-xl text-xs font-black hover:bg-purple-400 transition-colors">
                            <i data-lucide="download" class="w-4 h-4"></i> .MD
                        </button>
                    </div>
                </div>
                <div class="p-10 max-h-[600px] overflow-y-auto custom-scrollbar bg-black/40">
                    <h2 id="articleTitle" class="text-4xl font-black mb-8 text-white leading-tight"></h2>
                    <div id="markdownOutput" class="mono text-sm text-gray-400 whitespace-pre-wrap leading-relaxed"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-20 py-12 border-t border-white/5 text-center">
        <p class="text-gray-600 text-xs font-mono mb-4 tracking-widest">
            &copy; 2026 GHOST-SCRAPE.TECH — <span class="text-white">POWERING AI AGENTS</span>
        </p>
        <div class="flex justify-center gap-6 text-gray-500 text-[10px] uppercase font-bold">
            <a href="#" class="hover:text-purple-500 transition-colors">Contact</a>
            <a href="#" class="hover:text-purple-500 transition-colors">Terms</a>
            <a href="#" class="hover:text-purple-500 transition-colors">GitHub</a>
        </div>
    </footer>

    <script>
        let currentMarkdown = "";

        // Initialize Lucide Icons
        lucide.createIcons();

        async function handleScrape() {
            const btn = document.getElementById('scrapeBtn');
            const url = document.getElementById('urlInput').value;
            if (!url) return;

            btn.disabled = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<div class="loader"></div>`;

            try {
                const response = await fetch(`/api/scrape?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.success) {
                    currentMarkdown = data.markdown;
                    document.getElementById('articleTitle').innerText = data.title;
                    document.getElementById('markdownOutput').innerText = data.markdown;
                    document.getElementById('wordCount').innerText = data.wordCount;
                    document.getElementById('sourceType').innerText = data.source;
                    document.getElementById('resultArea').classList.remove('hidden');
                    
                    // Smooth scroll to result
                    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Extraction failed. The ghost couldn't find the data.");
                }
            } catch (err) {
                alert("Connection lost. Backend unresponsive.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons(); // Re-render icons inside button
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(currentMarkdown);
            // Quick button feedback
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-purple-600 px-6 py-3 rounded-full text-sm font-bold shadow-2xl animate-bounce';
            toast.innerText = 'Copied to clipboard! 👻';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function downloadMd() {
            const blob = new Blob([currentMarkdown], { type: "text/markdown" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `ghost-scrape-${Date.now()}.md`;
            a.click();
        }
    </script>
</body>
</html>
