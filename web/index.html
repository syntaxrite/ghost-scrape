<!DOCTYPE html>
<html>
<head>
    <title>GhostScrape Quick Test</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        #output { background: #f4f4f4; border: 1px solid #ccc; padding: 15px; overflow-x: auto; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>GhostScrape Debugger (No Auth)</h1>
    <p>Test the scraping logic directly. No API Key required for this test.</p>

    <input type="text" id="url" placeholder="https://example.com">
    <button id="btn" onclick="runTest()">Scrape URL</button>

    <div id="output">Results will appear here...</div>

    <script>
        async function runTest() {
            const urlValue = document.getElementById('url').value;
            const out = document.getElementById('output');
            const btn = document.getElementById('btn');

            if (!urlValue) return alert("Enter a URL");

            out.innerText = "Processing... (This can take 5-15 seconds if Stealth mode triggers)";
            btn.disabled = true;

            try {
                // Pointing to your local or Vercel /scrape endpoint
                const response = await fetch(`/scrape?url=${encodeURIComponent(urlValue)}`);
                const data = await response.json();
                
                if (data.success) {
                    out.innerHTML = `<strong>Mode:</strong> ${data.mode}<br><strong>Title:</strong> ${data.title}<hr>${data.markdown}`;
                } else {
                    out.innerText = "Error: " + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                out.innerText = "Fatal Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
