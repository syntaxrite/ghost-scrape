<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostScrape | Developer Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-bold text-white">Ghost<span class="text-blue-500">Scrape</span></h1>
            <div id="auth-section">
                </div>
        </div>

        <div id="dashboard" class="hidden space-y-8">
            <div class="glass p-8 rounded-2xl">
                <h3 class="text-slate-400 text-sm font-bold uppercase mb-4">Your API Key</h3>
                <div class="flex gap-4">
                    <input id="apiKeyDisplay" readonly class="bg-black/50 border border-slate-700 p-3 rounded-lg flex-1 text-blue-400 font-mono">
                    <button onclick="copyKey()" class="bg-slate-700 px-6 rounded-lg hover:bg-slate-600">Copy</button>
                </div>
                <div class="mt-4 flex gap-8">
                    <div><p class="text-xs text-slate-500">Usage</p><p id="usageText" class="font-bold">0 / 100</p></div>
                    <div><p class="text-xs text-slate-500">Plan</p><p id="tierText" class="font-bold uppercase text-blue-400">Free</p></div>
                </div>
            </div>

            <div class="glass p-8 rounded-2xl">
                <h3 class="text-slate-400 text-sm font-bold uppercase mb-4">Test Scraper</h3>
                <div class="flex gap-2">
                    <input id="testUrl" placeholder="https://reddit.com/..." class="flex-1 bg-black/50 border border-slate-700 p-3 rounded-lg outline-none">
                    <button onclick="testApi()" class="bg-blue-600 px-8 rounded-lg font-bold">Run</button>
                </div>
                <pre id="testOutput" class="mt-6 bg-black/30 p-4 rounded-lg text-xs max-h-64 overflow-auto text-slate-400 mono"></pre>
            </div>
        </div>

        <div id="login-form" class="glass p-8 rounded-2xl max-w-sm mx-auto text-center">
            <h2 class="text-xl font-bold mb-6">Developer Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full bg-black/50 border border-slate-700 p-3 rounded-lg mb-4">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Get Magic Link</button>
            <p class="text-xs text-slate-500 mt-4">We'll email you a login link.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const API_BASE = "https://api.ghost-scrape.tech";
        const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            await supabase.auth.signInWithOtp({ email });
            alert("Check your email for the magic link!");
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
                // Fetch Profile
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                document.getElementById('apiKeyDisplay').value = profile.api_key;
                document.getElementById('usageText').innerText = `${profile.usage_count} / ${profile.usage_limit}`;
                document.getElementById('tierText').innerText = profile.tier;
            }
        }

        async function testApi() {
            const url = document.getElementById('testUrl').value;
            const key = document.getElementById('apiKeyDisplay').value;
            const out = document.getElementById('testOutput');
            out.innerText = "Processing...";
            
            try {
                const res = await fetch(`${API_BASE}/scrape?url=${encodeURIComponent(url)}`, {
                    headers: { 'x-api-key': key }
                });
                const data = await res.json();
                out.innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                out.innerText = "Error: " + e.message;
            }
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('apiKeyDisplay').value);
            alert("API Key Copied");
        }

        checkUser();
    </script>
</body>
</html>
