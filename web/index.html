<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostScrape</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

<div class="max-w-4xl mx-auto py-12 px-6">

    <h1 class="text-4xl font-bold mb-6 text-blue-400">👻 GhostScrape</h1>

    <div class="flex gap-2">
        <input id="urlInput" type="text" placeholder="Paste any URL..."
            class="flex-1 px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg outline-none">

        <button onclick="scrape()"
            class="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-500">
            Distill
        </button>
    </div>

    <p id="status" class="text-sm text-gray-400 mt-4"></p>

    <div id="result" class="mt-8 hidden">
        <h2 id="title" class="text-2xl font-bold mb-4"></h2>

        <div class="text-sm text-gray-400 mb-4">
            <span id="time"></span> • <span id="reduction"></span>
        </div>

        <pre id="output" class="bg-gray-900 p-4 rounded-lg overflow-auto text-sm whitespace-pre-wrap"></pre>
    </div>

</div>

<script>
const API = "https://ghost-scrape-production.up.railway.app";

async function scrape() {
    const url = document.getElementById("urlInput").value.trim();
    const status = document.getElementById("status");
    const resultDiv = document.getElementById("result");

    if (!url) return;

    status.innerText = "⏳ Processing...";
    resultDiv.classList.add("hidden");

    try {
        const res = await fetch(`${API}/scrape?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (!data.success) {
            throw new Error(data.error);
        }

        document.getElementById("title").innerText = data.title;
        document.getElementById("output").innerText = data.markdown;

        const reduction = ((1 - data.stats.distilled_chars / data.stats.raw_chars) * 100).toFixed(1);

        document.getElementById("time").innerText = `${data.time_ms} ms`;
        document.getElementById("reduction").innerText = `${reduction}% smaller`;

        status.innerText = "✅ Done";
        resultDiv.classList.remove("hidden");

    } catch (err) {
        console.error(err);
        status.innerText = "❌ " + err.message;
    }
}
</script>

</body>
</html>
