<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostScrape | Content Distiller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto py-12">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-3 tracking-tight text-white">
                Ghost<span class="text-blue-500">Scrape</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-lg mx-auto">
                Transform cluttered URLs into clean, structured Markdown.
            </p>
        </header>

        <main class="glass-card rounded-2xl p-2 mb-8">
            <div class="flex flex-col md:flex-row gap-2">
                <input id="urlInput" type="text" autofocus
                    placeholder="Paste URL here..."
                    class="flex-1 px-5 py-4 bg-black/40 border border-slate-700 rounded-xl outline-none input-glow transition-all text-slate-100">
                <button onclick="scrape()" id="scrapeBtn"
                    class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                    <span>Distill</span>
                </button>
            </div>
        </main>

        <div id="loader" class="hidden mb-6 flex items-center justify-center gap-3 py-8 glass-card rounded-xl">
            <div class="animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full"></div>
            <span class="text-blue-400 font-medium">Extracting content...</span>
        </div>

        <div id="result" class="hidden">
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="border-b border-white/10 p-6 flex justify-between items-center">
                    <h2 id="title" class="text-2xl font-bold text-white truncate pr-4"></h2>
                    <button onclick="copyOutput()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-5 py-2 rounded-lg text-sm">Copy</button>
                </div>
                <pre id="output" class="p-6 text-sm text-slate-300 mono bg-black/20 whitespace-pre-wrap max-h-[600px] overflow-auto"></pre>
            </div>
        </div>
    </div>

    <script>
        const API = "https://api.ghost-scrape.tech";

        async function scrape() {
            const url = document.getElementById("urlInput").value.trim();
            const loader = document.getElementById("loader");
            const resultDiv = document.getElementById("result");

            if (!url) return;

            loader.classList.remove("hidden");
            resultDiv.classList.add("hidden");

            try {
                const res = await fetch(`${API}/scrape?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (!data.success) throw new Error(data.error);

                document.getElementById("title").innerText = data.title;
                document.getElementById("output").innerText = data.markdown;
                resultDiv.classList.remove("hidden");
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                loader.classList.add("hidden");
            }
        }

        async function copyOutput() {
            const text = document.getElementById("output").innerText;
            await navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
